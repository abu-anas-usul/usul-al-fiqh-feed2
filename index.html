<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/x-icon" href="UsulALFiqh.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خلاصات أبحاث أصول الفقه - أبو أنس</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8dcc4 100%);
            color: #2c3e50;
            line-height: 1.8;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1e5128 0%, #2d6a4f 100%);
            color: #fff;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '﷽';
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 24px;
            opacity: 0.3;
            font-family: 'Scheherazade New', serif;
        }

        header h1 {            font-size: 2.5em;
            margin-bottom: 10px;
            font-family: 'Scheherazade New', serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .date-display {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 15px;
            font-size: 1.1em;
        }

        .research-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .research-card {
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 5px solid #d4af37;
            position: relative;
        }

        .research-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .research-card::before {
            content: '❋';
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 24px;
            color: #d4af37;
            opacity: 0.3;        }

        .research-title {
            font-size: 1.5em;
            color: #1e5128;
            margin-bottom: 15px;
            font-family: 'Scheherazade New', serif;
            font-weight: 700;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
        }

        .research-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .meta-tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9em;
            color: #555;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2em;
            color: #2d6a4f;
            margin-bottom: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '◆';
            color: #d4af37;
        }

        .section-content {
            color: #444;
            text-align: justify;
            padding-right: 15px;            border-right: 3px solid #e8dcc4;
        }

        .strengths-weaknesses {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .strength, .weakness {
            padding: 15px;
            border-radius: 10px;
        }

        .strength {
            background: #e8f5e9;
            border-right: 4px solid #4caf50;
        }

        .weakness {
            background: #ffebee;
            border-right: 4px solid #f44336;
        }

        .suggestions {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid #ff9800;
            margin-top: 15px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #1e5128;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        footer {            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .research-grid {
                grid-template-columns: 1fr;
            }
            
            .strengths-weaknesses {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>خلاصات أبحاث أصول الفقه</h1>
            <p>ثلاثة أبحاث جديدة يومياً لخدمة طلاب العلم</p>
            <div class="date-display" id="currentDate"></div>
        </header>

        <div id="loading" class="loading">
            جارٍ تحميل الأبحاث...
        </div>

        <div id="researchGrid" class="research-grid" style="display: none;"></div>

        <div id="error" class="error" style="display: none;"></div>

        <footer>
            <p>إعداد: أبو أنس | تحديث يومي الساعة 7:00 صباحاً</p>
        </footer>
    </div>

    <script>
        // عرض التاريخ الحالي
        function displayDate() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric',                 month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('currentDate').textContent = 
                now.toLocaleDateString('ar-SA', options);
        }

        // تحميل الأبحاث من ملف JSON
        async function loadResearch() {
            try {
                const response = await fetch('research.json');
                if (!response.ok) throw new Error('فشل في تحميل البيانات');
                
                const data = await response.json();
                displayResearch(data.researches);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 
                    'عذراً، حدث خطأ في تحميل الأبحاث: ' + error.message;
            }
        }

        // عرض الأبحاث
        function displayResearch(researches) {
            document.getElementById('loading').style.display = 'none';
            const grid = document.getElementById('researchGrid');
            grid.style.display = 'grid';

            researches.forEach(research => {
                const card = document.createElement('div');
                card.className = 'research-card';
                
                card.innerHTML = `
                    <h2 class="research-title">${research.title}</h2>
                    
                    <div class="research-meta">
                        <span class="meta-tag">📚 ${research.author}</span>
                        <span class="meta-tag">📅 ${research.year}</span>
                        <span class="meta-tag">📖 ${research.source}</span>
                    </div>

                    <div class="section">
                        <div class="section-title">المشكلة البحثية</div>
                        <div class="section-content">${research.problem}</div>
                    </div>

                    <div class="section">                        <div class="section-title">الملخص</div>
                        <div class="section-content">${research.summary}</div>
                    </div>

                    <div class="section">
                        <div class="section-title">المنهجية</div>
                        <div class="section-content">${research.methodology}</div>
                    </div>

                    <div class="section">
                        <div class="section-title">النتائج</div>
                        <div class="section-content">${research.results}</div>
                    </div>

                    <div class="section">
                        <div class="section-title">التوصيات</div>
                        <div class="section-content">${research.recommendations}</div>
                    </div>

                    <div class="section">
                        <div class="section-title">التقييم النقدي</div>
                        <div class="strengths-weaknesses">
                            <div class="strength">
                                <strong>نقاط القوة:</strong><br>
                                ${research.strengths}
                            </div>
                            <div class="weakness">
                                <strong>نقاط الضعف:</strong><br>
                                ${research.weaknesses}
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">أفكار مستوحاة لأبحاث الترقية</div>
                        <div class="suggestions">${research.suggestions}</div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // تشغيل عند تحميل الصفحة
        displayDate();
        loadResearch();

        // تحديث الصفحة كل ساعة للتحقق من التحديثات
        setInterval(loadResearch, 3600000);
    </script></body>
</html>
